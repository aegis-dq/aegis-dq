site_name: Aegis
site_description: Open, audit-grade agentic data quality framework
site_url: https://aegis-dq.github.io/aegis-dq
repo_url: https://github.com/aegis-dq/aegis-dq
repo_name: aegis-dq/aegis-dq
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Rule Schema Reference: rule-schema-reference.md
  - Integrations:
    - dbt: integrations/dbt.md
    - Airflow: integrations/airflow.md
    - MCP Server: integrations/mcp.md
  - vs Competitors: vs-competitors.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aegis-dq/aegis-dq
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aegis-dq/

copyright: Copyright &copy; 2026 Aegis Contributors — Apache 2.0
